################################################################################
# OPTIMIZED ANTI-OVERFITTING CONFIGURATION
#
# This configuration addresses the issue where Round 1 performs best
# and subsequent rounds degrade performance (overfitting/client drift).
#
# Key changes from default:
#   1. Aggressive early stopping (patience=2)
#   2. Minimal local training (LOCAL_EPOCHS=1)
#   3. Stronger FedProx regularization (PROXIMAL_MU=0.05)
#   4. Increased dropout (DROPOUT=0.2, LORA_DROPOUT=0.1)
#   5. Higher weight decay (WEIGHT_DECAY=0.02)
#   6. Smaller model (D_MODEL=256, LLM_LAYERS=2, LORA_R=4)
#
# Use this when: Training degrades after first round, high client drift
################################################################################

################################################################################
# FEDERATED LEARNING CORE PARAMETERS
################################################################################

NUM_ROUNDS=20
FRACTION_TRAIN=1.0

# CRITICAL FIX #1: Reduce local overtraining
# Changed from: 2 → 1
# Why: Single epoch per round prevents clients from overfitting to local data
LOCAL_EPOCHS=1

# Slightly lower LR since we're doing less local training
# Changed from: 0.0005 → 0.0003
LEARNING_RATE=0.0003

BATCH_SIZE=32
NUM_CLIENTS=5

################################################################################
# FEDERATED LEARNING STRATEGY & OPTIMIZATION
################################################################################

STRATEGY="fedprox"

# CRITICAL FIX #2: Increase FedProx strength to reduce client drift
# Changed from: 0.01 → 0.05
# Why: Stronger proximal term keeps clients closer to global model
# Note: Can increase to 0.1 or 0.2 if drift persists
PROXIMAL_MU=0.05

WARMUP_ROUNDS=1

# CRITICAL FIX #3: Higher weight decay for better regularization
# Changed from: 0.01 → 0.02
# Why: Penalizes large weights more strongly
WEIGHT_DECAY=0.02

EARLY_STOPPING=true

# CRITICAL FIX #4: Aggressive early stopping
# Changed from: 5 → 2
# Why: Stops quickly when validation loss stops improving
# Note: This assumes early stopping properly restores best weights
EARLY_STOP_PATIENCE=2

################################################################################
# TIME SERIES FORECASTING PARAMETERS
################################################################################

SEQ_LEN=336
PRED_LEN=72

################################################################################
# MODEL ARCHITECTURE PARAMETERS
################################################################################

PATCH_SIZE=4
STRIDE=1

# CRITICAL FIX #5: Shrink model - reduce width
# Changed from: 768 → 256
# Why: Smaller model = less capacity to overfit
# Note: Can try 384 if 256 is too small
D_MODEL=768

# Keep hidden size proportional to d_model
# Changed from: 16 → 32 (d_model/8)
HIDDEN_SIZE=32

KERNEL_SIZE=3

# CRITICAL FIX #6: Shrink model - reduce depth
# Changed from: 4 → 2
# Why: Fewer layers = less parameters = less overfitting
LLM_LAYERS=2

################################################################################
# LORA PARAMETERS
################################################################################

# CRITICAL FIX #7: Reduce LoRA rank
# Changed from: 8 → 4
# Why: Fewer trainable parameters
LORA_R=4

# Keep 2x ratio: alpha = 2 * r
# Changed from: 16 → 8
LORA_ALPHA=8

# CRITICAL FIX #8: Add LoRA dropout
# Changed from: 0.0 → 0.1
# Why: Regularization for LoRA adapters
LORA_DROPOUT=0.1

################################################################################
# REGULARIZATION PARAMETERS
################################################################################

# CRITICAL FIX #9: Increase main dropout
# Changed from: 0.1 → 0.2
# Why: Stronger regularization to prevent overfitting
# Note: Can try 0.3 if still overfitting
DROPOUT=0.2

################################################################################
# ENVIRONMENT & SYSTEM
################################################################################

CONDA_ENV=flwr39
SKIP_SETUP=true
SKIP_VENV_CHECK=false
USE_LATEST_DEPS=false

################################################################################
# PARALLEL EXECUTION
################################################################################

MAX_PARALLEL=3

################################################################################
# MODE
################################################################################

MODE=""

################################################################################
# ADVANCED OPTIONS
################################################################################

AUTO_APPROVE=false
DRY_RUN=false

################################################################################
# GRID SEARCH (optional)
################################################################################

# Uncomment to test different FedProx strengths
# proximal_mu_GRID="0.05,0.1,0.2"

# Uncomment to test different model sizes
# d_model_GRID="256,384,512"
# llm_layers_GRID="2,3"

lr_GRID=""
pred_len_GRID="72"
llm_layers_GRID=""
dropout_GRID=""

################################################################################
# USAGE NOTES
################################################################################

# This configuration is optimized for scenarios where:
#   - Round 1 achieves best performance
#   - Subsequent rounds degrade performance
#   - High client drift / heterogeneous data
#
# If you still see degradation:
#   1. Increase PROXIMAL_MU to 0.1 or 0.2
#   2. Increase DROPOUT to 0.25 or 0.3
#   3. Further reduce D_MODEL to 128 or LORA_R to 2
#
# If performance is too poor (underfitting):
#   1. Increase D_MODEL back to 384 or 512
#   2. Increase LLM_LAYERS back to 3
#   3. Reduce DROPOUT to 0.15
#   4. Increase LOCAL_EPOCHS back to 2 (but watch for overfitting)
#
# Monitor training logs to see if:
#   - Validation loss improves over rounds (good)
#   - Training loss << validation loss (overfitting)
#   - Both losses plateau early (may need more capacity)

################################################################################
# END OF CONFIGURATION
################################################################################

# Client and Epoch Sweep Configuration
# Tests 3 vs 5 clients with 1 and 2 local epochs
# Quick rounds for fast iteration

# ========================================
# 3 Clients
# ========================================

# 3 clients, 1 epoch
--mode quick --num-clients 3 --local-epochs 1

# 3 clients, 2 epochs
--mode quick --num-clients 3 --local-epochs 2

# 3 clients, 1 epoch, lower LR
--rounds 5 --num-clients 3 --local-epochs 1 --lr 0.0003

# 3 clients, 2 epochs, lower LR
--rounds 5 --num-clients 3 --local-epochs 2 --lr 0.0003

# ========================================
# 5 Clients (Full dataset)
# ========================================

# 5 clients, 1 epoch
--mode quick --num-clients 5 --local-epochs 1

# 5 clients, 2 epochs
--mode quick --num-clients 5 --local-epochs 2

# 5 clients, 1 epoch, lower LR
--rounds 5 --num-clients 5 --local-epochs 1 --lr 0.0003

# 5 clients, 2 epochs, lower LR
--rounds 5 --num-clients 5 --local-epochs 2 --lr 0.0003

# ========================================
# Extended runs for best configs
# ========================================

# 3 clients, 1 epoch, standard rounds
--rounds 10 --num-clients 3 --local-epochs 1 --lr 0.0005

# 5 clients, 1 epoch, standard rounds
--rounds 10 --num-clients 5 --local-epochs 1 --lr 0.0005

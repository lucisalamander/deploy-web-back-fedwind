services:
  - type: web
    name: fedwind-api
    runtime: python
    rootDir: federated-website/FastApi
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TRAINING_PYTHON
        sync: false
      - key: TRAINING_REPO_ROOT
        sync: false
      - key: RUN_SCRIPT
        sync: false
      - key: CENTRALIZED_WEB_DIR
        sync: false
      - key: FLWR_EXE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fedwind-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: SUPPORT_CHAT_ID
        sync: false

databases:
  - name: fedwind-db
    databaseName: fedwind_feedback
    user: fedwind

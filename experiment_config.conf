################################################################################
# FEDERATED LEARNING EXPERIMENT CONFIGURATION
# 
# One config to rule them all: GPT, LLaMA, and BART with grid search.
################################################################################

# RESOURCE ALLOCATION
MAX_PARALLEL=3

# MODEL SELECTION GRID
# This will run each of the 3 major architectures
model_GRID="gpt4ts_nonlinear,llama_nonlinear,bart_nonlinear"

# HYPERPARAMETER GRID
# Learning rate sweep
lr_GRID="0.0001,0.0005,0.001"
# Number of LLM transformer layers to use
llm_layers_GRID="2,4,6"
# Regularization sweep
dropout_GRID="0.1,0.15"

# SHARED PARAMETERS (Default values for all experiments)
NUM_ROUNDS=10
LOCAL_EPOCHS=2
BATCH_SIZE=32
NUM_CLIENTS=5

# FORECASTING PARAMETERS
SEQ_LEN=336
PRED_LEN=72

# AGGREGATION STRATEGY
STRATEGY="fedprox"
PROXIMAL_MU=0.01

# LORA PARAMETERS
LORA_R=8
LORA_ALPHA=16
LORA_DROPOUT=0.0

# SYSTEM SETTINGS
CONDA_ENV=flwr39
SKIP_SETUP=true
AUTO_APPROVE=true

################################################################################
# PERFORMANCE TUNING TIPS
################################################################################

# 1. FASTER TRAINING:
#    - Reduce NUM_ROUNDS (e.g., 5-8 instead of 10)
#    - Reduce LOCAL_EPOCHS (e.g., 1 instead of 2)
#    - Reduce NUM_CLIENTS (e.g., 2-3 instead of 5)
#    - Increase BATCH_SIZE (e.g., 64 instead of 32) if GPU allows
#    - Reduce LLM_LAYERS (e.g., 2 instead of 4)

# 2. BETTER ACCURACY:
#    - Increase NUM_ROUNDS (e.g., 15-20)
#    - Increase LOCAL_EPOCHS (e.g., 3-5)
#    - Increase SEQ_LEN (more historical context)
#    - Increase LLM_LAYERS (deeper model)
#    - Increase D_MODEL (wider model)
#    - Tune LEARNING_RATE (try 0.0001-0.001)
#    - Adjust DROPOUT (try 0.1-0.2)

# 3. PREVENT OVERFITTING:
#    - Increase DROPOUT (0.2-0.3)
#    - Increase LORA_DROPOUT (0.1-0.2)
#    - Reduce LOCAL_EPOCHS (1-2)
#    - Reduce LLM_LAYERS (2-3)
#    - Increase NUM_CLIENTS (more data diversity)

# 4. SAVE GPU MEMORY:
#    - Reduce BATCH_SIZE (16 or 8)
#    - Reduce SEQ_LEN
#    - Reduce D_MODEL (256-512)
#    - Reduce LLM_LAYERS (2-3)
#    - Use gradient accumulation (not yet implemented)

# 5. HYPERPARAMETER SEARCH:
#    - Create experiments_grid.conf with different combinations
#    - Run with: ./run_parallel_experiments.sh --config experiments_grid.conf
#    - Key parameters to tune:
#      * LEARNING_RATE: 0.0001, 0.0005, 0.001
#      * PRED_LEN: 24, 96, 120, 168
#      * LLM_LAYERS: 2, 4, 6
#      * DROPOUT: 0.0, 0.1, 0.15, 0.2


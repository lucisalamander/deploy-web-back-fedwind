################################################################################
# COMPLETE FEDERATED LEARNING EXPERIMENT CONFIGURATION
#
# This file contains EVERY SINGLE configurable parameter with detailed comments.
# Use this as a reference or copy it to create your own configurations.
#
# Usage:
#   ./run_flower_experiment.sh --config experiment_config_FULL_EXAMPLE.conf
#
# Note: This is an EXAMPLE file showing ALL options. For actual experiments,
#       you typically only need to modify a subset of these parameters.
################################################################################

################################################################################
# FEDERATED LEARNING CORE PARAMETERS
################################################################################

# NUM_ROUNDS: Total number of federated learning rounds to run
# - Each round: all clients train locally, then server aggregates their models
# - Higher values = longer training, potentially better convergence
# - Typical range: 5-50 rounds
# - Example values:
#   * 2-5: Quick debugging
#   * 10-15: Standard training
#   * 20-50: Thorough training
NUM_ROUNDS=10

# FRACTION_TRAIN: Fraction of clients to sample for each training round
# - 1.0 means use ALL clients every round (most common)
# - 0.5 means randomly sample 50% of clients each round
# - Lower values reduce computation but may slow convergence
# - Must be between 0.0 and 1.0
# - With NUM_CLIENTS=5:
#   * 1.0 = 5 clients
#   * 0.6 = 3 clients
#   * 0.4 = 2 clients
FRACTION_TRAIN=1.0

# LOCAL_EPOCHS: Number of training epochs each client performs per round
# - Higher values = more local training, better local adaptation, but risk overfitting
# - Lower values = less computation, faster rounds, more communication
# - Typical range: 1-5 epochs
# - Trade-off: computation vs communication efficiency
# - Example values:
#   * 1: Fast iteration, more federated rounds needed
#   * 2-3: Balanced (RECOMMENDED)
#   * 5+: Heavy local training, may diverge from global model
LOCAL_EPOCHS=3

# LEARNING_RATE: Base learning rate for local training (per client)
# - Controls step size during gradient descent optimization
# - Decays by 5% per round automatically: lr × 0.95^(round-1)
# - Too high = unstable training, divergence
# - Too low = slow convergence, may get stuck
# - Typical range: 0.00001 - 0.01
# - Example values:
#   * 0.00001: Very conservative, slow but stable
#   * 0.0001: Conservative for large models
#   * 0.0005: Balanced (RECOMMENDED for GPT-based models)
#   * 0.001: Aggressive, faster but less stable
#   * 0.01: Very aggressive, risk of divergence
# - Round 1: 0.0005
# - Round 2: 0.000475 (0.0005 × 0.95)
# - Round 3: 0.00045  (0.0005 × 0.95²)
# - Round 10: 0.000315 (0.0005 × 0.95⁹)
LEARNING_RATE=0.0005

# BATCH_SIZE: Number of samples per training batch
# - Larger batches = more stable gradients, faster training, more GPU memory
# - Smaller batches = more gradient updates, less memory, noisier gradients
# - Must be power of 2 for optimal GPU performance (8, 16, 32, 64, etc.)
# - Limited by GPU memory (larger models need smaller batches)
# - Typical range: 8-128
# - Example values:
#   * 8: Small batch, limited GPU memory, noisy updates
#   * 16: Small-medium batch, good for debugging
#   * 32: Medium batch (RECOMMENDED for most cases)
#   * 64: Large batch, smoother gradients, needs more memory
#   * 128+: Very large batch, needs powerful GPU
BATCH_SIZE=32

# NUM_CLIENTS: Total number of simulated federated learning clients
# - Each client trains on a different dataset (different NASA wind locations)
# - More clients = more data diversity, but slower rounds
# - MUST match a federation defined in pyproject.toml:
#   * Valid values: 1, 2, 3, 4, 5, 7, 10
# - Client datasets (for NUM_CLIENTS=5):
#   * Client 0: nasa_almaty.csv (Almaty, Kazakhstan)
#   * Client 1: nasa_zhezkazgan.csv (Zhezkazgan, Kazakhstan)
#   * Client 2: nasa_aktau.csv (Aktau, Kazakhstan)
#   * Client 3: nasa_taraz.csv (Taraz, Kazakhstan)
#   * Client 4: nasa_aktobe.csv (Aktobe, Kazakhstan)
# - Example values:
#   * 1: Single client (centralized learning, no federation)
#   * 2: Minimal federation for debugging
#   * 5: Standard setup (RECOMMENDED)
#   * 10: Maximum clients, more diversity
NUM_CLIENTS=5

################################################################################
# FEDERATED LEARNING STRATEGY & OPTIMIZATION PARAMETERS
################################################################################

# STRATEGY: Federated learning aggregation strategy
# - Controls how client model updates are combined on the server
# - Options:
#   * "fedavg": Federated Averaging - simple weighted average of client models
#   * "fedprox": FedProx - adds proximal term to penalize large deviations from global model
# - FedAvg: Fast, simple, works well when client data is relatively uniform
# - FedProx: Better for heterogeneous (non-IID) data, more stable convergence
# - Default: "fedavg"
STRATEGY="fedavg"

# PROXIMAL_MU: FedProx proximal term coefficient
# - Only used when STRATEGY="fedprox"
# - Adds penalty term: (mu/2) * ||local_weights - global_weights||^2
# - Higher mu = clients stay closer to global model (less personalization)
# - Lower mu = more local adaptation (more like FedAvg)
# - Typical range: 0.001 - 0.1
# - Example values:
#   * 0.001: Very weak regularization
#   * 0.01: Standard regularization (RECOMMENDED)
#   * 0.1: Strong regularization
# - Default: 0.01
PROXIMAL_MU=0.01

# WARMUP_ROUNDS: Number of rounds for learning rate warmup
# - Gradually increases LR from 0 to LEARNING_RATE over first N rounds
# - Helps stabilize early training and prevent divergence
# - After warmup, LR decays by 0.9 per round
# - Typical range: 0-5 rounds
# - Example values:
#   * 0: No warmup (start with full LR immediately)
#   * 3: Standard warmup (RECOMMENDED)
#   * 5: Conservative warmup for large models
# - LR schedule example (LEARNING_RATE=0.001, WARMUP_ROUNDS=3):
#   * Round 1: 0.000333 (1/3 of base LR)
#   * Round 2: 0.000667 (2/3 of base LR)
#   * Round 3: 0.001 (full base LR)
#   * Round 4: 0.0009 (0.001 × 0.9)
#   * Round 5: 0.00081 (0.001 × 0.9²)
# - Default: 3
WARMUP_ROUNDS=3

# WEIGHT_DECAY: L2 regularization coefficient for AdamW optimizer
# - Penalizes large weights to prevent overfitting
# - Applied as: loss + (weight_decay/2) * ||weights||²
# - Higher values = stronger regularization, simpler model
# - Lower values = less regularization, model can be more complex
# - Typical range: 0.0 - 0.1
# - Example values:
#   * 0.0: No weight decay (not recommended, may overfit)
#   * 0.001: Light regularization
#   * 0.01: Standard regularization (RECOMMENDED)
#   * 0.1: Strong regularization (may underfit)
# - Default: 0.01
WEIGHT_DECAY=0.01

# EARLY_STOPPING: Enable or disable early stopping
# - Stops training if validation loss doesn't improve for N rounds
# - Saves time and prevents overfitting
# - Options: true, false
# - Default: true
EARLY_STOPPING=true

# EARLY_STOP_PATIENCE: Number of rounds without improvement before stopping
# - Only used when EARLY_STOPPING=true
# - If validation loss doesn't improve for this many rounds, training stops
# - Higher patience = more chances to improve (longer training)
# - Lower patience = stops sooner (faster, but may stop too early)
# - Typical range: 3-10 rounds
# - Example values:
#   * 3: Aggressive early stopping (fast experimentation)
#   * 5: Balanced early stopping (RECOMMENDED)
#   * 10: Patient early stopping (thorough training)
# - Default: 5
EARLY_STOP_PATIENCE=5

################################################################################
# TIME SERIES FORECASTING PARAMETERS
################################################################################

# SEQ_LEN: Input sequence length (lookback window in hours)
# - How many past timesteps the model sees before making predictions
# - Longer sequences = more context, but more computation and memory
# - Must be divisible by (PATCH_SIZE - STRIDE + 1) for clean patching
# - Typical range: 96-672 timesteps
# - For hourly data:
#   * 96: 4 days of history
#   * 168: 1 week of history
#   * 336: 2 weeks of history (RECOMMENDED)
#   * 672: 4 weeks of history
# - Trade-off: more context vs computational cost
# - Recommendation: Use 2-4x the prediction horizon
#   * For PRED_LEN=120 (5 days), use SEQ_LEN=336 (14 days)
SEQ_LEN=336

# PRED_LEN: Prediction horizon (forecast length in hours)
# - How many future timesteps to predict
# - Longer horizons = harder problem, less accuracy
# - Typical range: 24-720 timesteps
# - For hourly data:
#   * 24: 1 day ahead
#   * 48: 2 days ahead
#   * 96: 4 days ahead
#   * 120: 5 days ahead (RECOMMENDED)
#   * 168: 1 week ahead
#   * 336: 2 weeks ahead
#   * 720: 1 month ahead
# - Shorter horizons (24-96): Weather forecasting, operational planning
# - Medium horizons (120-168): Energy management, scheduling
# - Long horizons (336+): Strategic planning, challenging research
PRED_LEN=72

################################################################################
# MODEL ARCHITECTURE PARAMETERS (GPT4TS Transformer)
################################################################################

# PATCH_SIZE: Size of each time series patch
# - Time series is divided into non-overlapping patches of this size
# - Each patch is embedded and processed by GPT-2 transformer
# - Smaller patches = more patches, finer granularity, more computation
# - Larger patches = fewer patches, coarser granularity, less computation
# - Typical range: 2-16
# - Formula: num_patches = (SEQ_LEN - PATCH_SIZE) / STRIDE + 1
# - Example values:
#   * 2: Very fine-grained (many patches)
#   * 4: Balanced (RECOMMENDED)
#   * 8: Coarse-grained (fewer patches)
#   * 16: Very coarse (minimal patches)
# - For SEQ_LEN=336, PATCH_SIZE=4, STRIDE=1: ~333 patches
PATCH_SIZE=4

# STRIDE: Step size between consecutive patches
# - Controls overlap between patches
# - stride=1: Maximum overlap (sliding window)
# - stride=PATCH_SIZE: No overlap (non-overlapping patches)
# - Smaller stride = more patches, more computation, more detail
# - Typical range: 1 to PATCH_SIZE
# - Example values:
#   * 1: Sliding window, maximum overlap (RECOMMENDED)
#   * 2: 50% overlap
#   * PATCH_SIZE: No overlap, fewer patches
STRIDE=1

# D_MODEL: Model dimension (embedding size for GPT-2)
# - Size of the hidden representations throughout the transformer
# - Larger = more expressive model, but more parameters and slower
# - MUST match GPT-2 architecture if using pretrained weights:
#   * GPT2-small: 768 (RECOMMENDED)
#   * GPT2-medium: 1024
#   * GPT2-large: 1280
#   * GPT2-xl: 1600
# - For custom (non-pretrained) models: any value (typically 128-1024)
# - Trade-off: model capacity vs computational cost
# - Typical range: 128-1024
# - Example values:
#   * 128: Lightweight, fast, limited capacity
#   * 256: Small model, good for quick experiments
#   * 512: Medium model, balanced
#   * 768: GPT2-small (RECOMMENDED, pretrained available)
#   * 1024: Large model, high capacity
D_MODEL=768

# HIDDEN_SIZE: Hidden layer size for ConvMLP patch embedding
# - Size of the intermediate layer in the patch embedding network
# - Smaller than D_MODEL, acts as bottleneck before expansion
# - Controls capacity of the patch embedding transformation
# - Typical range: 8-128
# - Usually much smaller than D_MODEL (e.g., D_MODEL/16 to D_MODEL/4)
# - Example values:
#   * 8: Minimal capacity
#   * 16: Small capacity (RECOMMENDED for D_MODEL=768)
#   * 32: Medium capacity
#   * 64: Large capacity
#   * 128: Maximum capacity
HIDDEN_SIZE=16

# KERNEL_SIZE: Convolution kernel size for patch embedding
# - Size of 1D convolution filter applied to patches
# - Controls local receptive field in patch embedding
# - Typical range: 1-7 (odd numbers preferred for symmetry)
# - Example values:
#   * 1: No local context (just linear transformation)
#   * 3: Small local context (RECOMMENDED)
#   * 5: Medium local context
#   * 7: Large local context
KERNEL_SIZE=3

# LLM_LAYERS: Number of GPT-2 transformer layers to use
# - GPT2-base has 12 layers total, but we can use fewer for efficiency
# - More layers = deeper model, more parameters, better capacity, slower
# - Fewer layers = faster training, less memory, limited capacity
# - Must be ≤ 12 for GPT2-small pretrained weights
# - Typical range: 2-6 layers (out of 12)
# - Example values:
#   * 1: Minimal transformer (barely better than MLP)
#   * 2: Light transformer, fast
#   * 4: Medium transformer (RECOMMENDED)
#   * 6: Deep transformer, high capacity
#   * 8-12: Very deep, slow but powerful
# - Each layer adds ~7-10 million parameters (for d_model=768)
LLM_LAYERS=4

################################################################################
# LORA (LOW-RANK ADAPTATION) FINE-TUNING PARAMETERS
################################################################################
# LoRA is an efficient fine-tuning method that adds small trainable matrices
# to frozen pretrained weights, reducing trainable parameters by 10-100x

# LORA_R: LoRA rank (dimension of low-rank matrices)
# - Controls the capacity of LoRA adaptation
# - Higher rank = more parameters, more capacity, closer to full fine-tuning
# - Lower rank = fewer parameters, more efficient, more constrained
# - Typical range: 1-64
# - Formula: trainable_params ≈ 2 × d_model × lora_r × num_layers
# - Example values:
#   * 1-2: Minimal adaptation (ultra-efficient)
#   * 4: Low-rank adaptation
#   * 8: Standard adaptation (RECOMMENDED)
#   * 16: High-rank adaptation
#   * 32-64: Nearly full fine-tuning
# - For d_model=768, lora_r=8: ~12k parameters per layer
# - For d_model=768, lora_r=16: ~24k parameters per layer
LORA_R=8

# LORA_ALPHA: LoRA scaling factor
# - Controls the strength of LoRA updates relative to pretrained weights
# - Higher alpha = stronger LoRA influence
# - Typical value: 2 × lora_r (alpha = 2r is common heuristic)
# - Scaling formula: LoRA_contribution = alpha / r
# - Example values:
#   * lora_r: Equal scaling (1:1)
#   * 2 × lora_r: Standard scaling (RECOMMENDED)
#   * 4 × lora_r: Strong scaling
# - For LORA_R=8, use LORA_ALPHA=16
# - For LORA_R=16, use LORA_ALPHA=32
LORA_ALPHA=16

# LORA_DROPOUT: Dropout rate applied to LoRA layers
# - Regularization technique to prevent overfitting in LoRA adaptation
# - 0.0 = no dropout (no regularization)
# - Higher values = stronger regularization, risk underfitting
# - Typical range: 0.0-0.2
# - Example values:
#   * 0.0: No dropout (RECOMMENDED for small datasets)
#   * 0.05: Light regularization
#   * 0.1: Standard regularization
#   * 0.2: Strong regularization
# - Note: LoRA already acts as regularization (low-rank), so dropout often not needed
LORA_DROPOUT=0.0

################################################################################
# REGULARIZATION PARAMETERS
################################################################################

# DROPOUT: Main model dropout rate (applied to transformer layers)
# - Randomly sets activations to zero during training
# - Prevents overfitting by forcing the model to learn robust features
# - Applied to: transformer outputs, embeddings, pre-output layers
# - 0.0 = no dropout (risk overfitting)
# - Higher values = stronger regularization, risk underfitting
# - Typical range: 0.0-0.3
# - Example values:
#   * 0.0: No dropout (only for large datasets)
#   * 0.05: Very light regularization
#   * 0.1: Light regularization
#   * 0.15: Medium regularization (RECOMMENDED)
#   * 0.2: Strong regularization
#   * 0.3: Very strong regularization (may hurt performance)
# - Recommendation: Start with 0.15, increase if overfitting, decrease if underfitting
DROPOUT=0.15

################################################################################
# EARLY STOPPING CONFIGURATION
# (Currently hardcoded in server_app.py, shown here for reference)
################################################################################

# PATIENCE: Number of rounds without improvement before stopping
# - If validation loss doesn't improve for PATIENCE rounds, training stops

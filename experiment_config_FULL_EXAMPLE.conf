################################################################################
# ENVIRONMENT & SYSTEM CONFIGURATION
################################################################################

# CONDA_ENV: Name of the conda environment to use
# - Must have flwr[simulation] installed
# - Default: flwr39 (Python 3.9 environment)
# - To change: create new conda env with different name
# - Setup: conda create -n YOUR_ENV_NAME python=3.9 -y
#          conda activate YOUR_ENV_NAME
#          pip install flwr[simulation]
CONDA_ENV=flwr39

# SKIP_SETUP: Whether to skip environment checks
# - true: Skip Python/CUDA/venv checks (FASTER, assumes env is ready)
# - false: Run full environment setup (slower, but safer)
# - Set to false for first run, then true for subsequent runs
# - Always runs GPU selection even if true
SKIP_SETUP=true

# SKIP_VENV_CHECK: Whether to skip virtual environment verification
# - true: Don't check if conda env is activated
# - false: Verify conda env is active before running
# - Only matters if SKIP_SETUP=true
SKIP_VENV_CHECK=false

# USE_LATEST_DEPS: Which requirements file to use
# - false: Use requirements_ss.txt (simulation-specific, RECOMMENDED)
# - true: Use requirements.txt (all dependencies, may have conflicts)
# - Only used if installing dependencies (--setup flag)
USE_LATEST_DEPS=false

################################################################################
# PARALLEL EXECUTION SETTINGS (for run_parallel_experiments.sh)
################################################################################

# MAX_PARALLEL: Maximum number of experiments to run simultaneously
# - Limited by: number of GPUs, GPU memory, CPU cores
# - Each experiment needs: 1 GPU (shared among clients), ~10 CPUs
# - Recommendation: 1-2 experiments per GPU for memory reasons
# - Example values:
#   * 1: Sequential execution (slowest, most conservative)
#   * 2: Two experiments at once (RECOMMENDED for 1 GPU)
#   * 3: Three experiments (needs 2+ GPUs)
#   * 4+: Multiple experiments (needs multiple GPUs)
# - GPU memory considerations:
#   * Each experiment uses 50-150 MB for model weights
#   * Plus ~2-4 GB for activations and gradients during training
#   * 12 GB GPU can handle 2-3 experiments if they don't overlap heavily
MAX_PARALLEL=3


# - Currently HARDCODED in server_app.py as patience=3
# - Typical range: 2-10 rounds
# - Example values:
#   * 2: Very aggressive stopping (save time, may stop too early)
#   * 3: Standard stopping (CURRENT DEFAULT)
#   * 5: Conservative stopping (more patient)
